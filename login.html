<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Internship Portal</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(
    135deg,
    #0f172a,
    #1e293b,
    #0f766e
    );

    display:flex;
    justify-content:center;
    align-items:center;
}

.main-box{

    width:950px;
    height:550px;

    background:rgba(255,255,255,0.08);

    border-radius:25px;

    backdrop-filter:blur(15px);

    overflow:hidden;

    display:flex;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.5);
}

.left-side{

    width:50%;

    background:linear-gradient(
    to bottom right,
    #06b6d4,
    #2563eb
    );

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;
}

.left-side h1{

    font-size:42px;
    font-weight:700;
    margin-bottom:20px;
}

.left-side p{

    font-size:16px;
    text-align:center;
    line-height:28px;
}

.right-side{

    width:50%;

    background:white;

    padding:60px 50px;
}

.form-title{

    font-size:34px;
    font-weight:700;
    margin-bottom:10px;

    color:#0f172a;
}

.form-subtitle{

    color:gray;
    margin-bottom:35px;
}

.form-control{

    height:50px;
    border-radius:12px;
    margin-bottom:20px;
}

.btn-login{

    width:100%;
    height:50px;

    border:none;
    border-radius:12px;

    background:linear-gradient(
    to right,
    #06b6d4,
    #2563eb
    );

    color:white;
    font-weight:600;

    transition:0.3s;
}

.btn-login:hover{

    transform:scale(1.02);
}

.bottom-text{

    margin-top:25px;
    text-align:center;
}

.bottom-text a{

    text-decoration:none;
    font-weight:600;
}

</style>

</head>

<body>

<div class="main-box">

    <div class="left-side">

        <h1>Internship Portal</h1>

        <p>
        Review internships,
        detect scams,
        and help students
        choose safe companies.
        </p>

    </div>

    <div class="right-side">

        <h2 class="form-title">
        Login
        </h2>

        <p class="form-subtitle">
        Welcome back
        </p>

<form action="LoginServlet" method="post">

    <input type="email"
    name="email"
    class="form-control"
    placeholder="Enter email"
    required>

    <input type="password"
    name="password"
    class="form-control"
    placeholder="Enter password"
    required>

    <button type="submit"
    class="btn-login">
    Login
    </button>

</form>

<div class="bottom-text">

    Don’t have an account?

    <a href="register.html">
    Register
    </a>

</div>

    </div>

</div>

</body>
</html>
